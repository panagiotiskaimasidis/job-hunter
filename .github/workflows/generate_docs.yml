name: 📄 Generate Docs (Notion-triggered)

on:
  schedule:
    # Runs every 2 hours during the day (08:00–20:00 UTC), Mon–Fri.
    # Flag a job as "Generate Docs → Yes" in Notion and it will be picked up within 2 hours.
    - cron: "0 8,10,12,14,16,18,20 * * 1-5"
  workflow_dispatch:   # also triggerable manually from the GitHub Actions UI

jobs:
  generate-docs:
    name: Generate CV + Cover Letter
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          NOTION_API_KEY=${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}
          GROQ_MODEL=llama-3.3-70b-versatile
          GEMINI_MODEL=gemini-2.0-flash
          MIN_MATCH_SCORE=8
          SCRAPE_DELAY_SECONDS=1
          MAX_JOBS_PER_BOARD=15
          SCRAPE_WORKERS=4
          EOF

      - name: Restore applications cache
        uses: actions/cache@v4
        with:
          path: |
            applications/
            data/jobs_processed.json
          key: applications-${{ github.run_id }}
          restore-keys: applications-

      - name: Generate docs for Notion-flagged jobs
        run: python main.py --generate-docs

      - name: Save applications cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            applications/
            data/jobs_processed.json
          key: applications-${{ github.run_id }}

      - name: Upload generated PDFs
        uses: actions/upload-artifact@v4
        with:
          name: applications-${{ github.run_number }}
          path: applications/
          retention-days: 30
